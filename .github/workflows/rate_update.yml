name: SBRateBot V5 GitHub Actions auto update


on:

  schedule:
    - cron: "30 15 * * *"

  workflow_dispatch:



permissions:

  contents: write



jobs:

  update-rate:


    runs-on: ubuntu-latest



    steps:


      # -------------------------------
      # Repository Checkout
      # -------------------------------
      - name: Checkout repository
        uses: actions/checkout@v5



      # -------------------------------
      # Python Setup
      # -------------------------------
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"



      # -------------------------------
      # Install Packages
      # -------------------------------
      - name: Install packages
        run: |

          python -m pip install --upgrade pip

          pip install requests urllib3



      # -------------------------------
      # Run FSB crawler
      # -------------------------------
      - name: Run FSB crawler
        run: |

          python crawler/fsb.py



      # -------------------------------
      # Commit updated data
      # -------------------------------
      - name: Commit updated data
        run: |

          git config user.name "github-actions"

          git config user.email "github-actions@github.com"


          git add data/latest_rates.json

          git add data/previous_rates.json

          git add data/update_info.json

          git add -f data/banks.json


          if git diff --cached --quiet; then

            echo "No changes to commit"

          else

            git commit -m "Auto update rates"

            git push

          fi