<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SBRateBot V4</title>

<link rel="stylesheet" href="/static/css/dashboard.css">

</head>


<body>


<div class="dashboard">


<!-- =====================
상단 영역
===================== -->


<div class="top-grid">


<div class="panel">

<h2>
정기예금 시장현황 (12개월 기준)
</h2>


<div class="kpi-mini">


<div>
<span>상품수</span>
<strong id="product-count">-</strong>
</div>


<div>
<span>최고금리</span>
<strong id="max-rate">-</strong>
</div>


<div>
<span>평균금리</span>
<strong id="avg-rate">-</strong>
</div>


<div>
<span>최저금리</span>
<strong id="min-rate">-</strong>
</div>


</div>

</div>





<div class="panel">

<h2>
AI 시장 요약
</h2>


<div id="ai-summary">
불러오는 중...
</div>


</div>





<div class="panel">

<h2>
AI 검색
</h2>


<input
id="ai-question"
placeholder="금리 관련 질문 입력"
/>


<button id="ai-search-btn">
검색
</button>


<div id="ai-answer"></div>


</div>


</div>








<!-- =====================
하단 영역
===================== -->


<div class="dashboard-grid">



<!-- 1열 -->

<div class="left-column">


<div class="panel">


<h2>
우리금융저축은행 Market Position
</h2>


<div class="position-summary">


<div>
<span>시장순위</span>
<strong id="market-rank">-</strong>
</div>


<div>
<span>4대금융 순위</span>
<strong id="financial-rank">-</strong>
</div>


<div>
<span>현재금리</span>
<strong id="woori-rate">-</strong>
</div>


<div>
<span>평균금리 대비</span>
<strong id="average-gap">-</strong>
</div>


<div>
<span>최고금리 대비</span>
<strong id="highest-gap">-</strong>
</div>


<div>
<span>최저금리 대비</span>
<strong id="lowest-gap">-</strong>
</div>


</div>


</div>







<div class="panel">


<h2>
금융지주 저축은행 비교
</h2>


<table>


<thead>

<tr>

<th>순위</th>

<th>저축은행명</th>

<th>상품명</th>

<th>금리</th>

<th>전일대비</th>

</tr>


</thead>


<tbody id="financial-table">

</tbody>


</table>


</div>



</div>









<!-- 2열 -->


<div class="panel">


<h2>
시장 TOP10
</h2>


<table>


<thead>

<tr>

<th>순위</th>

<th>저축은행</th>

<th>상품명</th>

<th>금리</th>

<th>전일대비</th>

</tr>


</thead>


<tbody id="market-table">

</tbody>


</table>


</div>









<!-- 3열 -->


<div class="panel">


<h2>
전체상품조회
</h2>


<div class="product-tabs">


<button class="active">
정기예금
</button>


<button>
적금
</button>


<button>
ISA
</button>


<button>
IRP
</button>


</div>





<div class="period-filter">


<button>
3개월
</button>


<button>
6개월
</button>


<button class="active">
12개월
</button>


<button>
24개월
</button>


</div>





<input
id="product-search"
placeholder="저축은행명 또는 상품명 검색"
/>





<table>


<thead>

<tr>

<th>저축은행명</th>

<th>상품명</th>

<th>금리</th>

<th>전일대비</th>

</tr>


</thead>


<tbody id="product-table">

</tbody>


</table>


</div>





</div>



</div>





<script src="/static/js/dashboard.js"></script>


</body>


</html>
